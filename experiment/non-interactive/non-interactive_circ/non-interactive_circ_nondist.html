// We first define the shuffling function
function shuffleArray(arr) {
  let array = arr.slice(); // copy so original isn’t mutated
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

// the function to generate object choices
function generateObjectChoices(target) {
  const [shape, type, color] = target.split("-");

  let choices;

  if (type === "nex") {
    if (shape === "tri") {
      choices = [
        `tri-nex-${color}`,
        `circle-nex-${color}`,
        `tri-nuni-${color}`
      ];
    } else if (shape === "circle") {
      choices = [
        `tri-nex-${color}`,
        `circle-nex-${color}`,
        `circle-nuni-${color}`
      ];
    }
  } else if (type === "nuni") {
    if (shape === "tri") {
      choices = [
        `tri-nuni-${color}`,
        `circle-nex-${color}`,
        `tri-nex-${color}`
      ];
    } else if (shape === "circle") {
      choices = [
        `circle-nuni-${color}`,
        `circle-nex-${color}`,
        `tri-nex-${color}`
      ];
    }
  } else {
    throw new Error(`Unknown target: ${target}`);
  }

  return shuffleArray(choices);
}

function collectSentences(inputList) {
  const promptDict = {};
  const returnDict = {};

  inputList.forEach(item => {
      const lexNumber = item.lexicalization_number;
      const sentence = item.sentence;
      if (promptDict.hasOwnProperty(lexNumber)) {
          promptDict[lexNumber].push(sentence);
      } else {
          promptDict[lexNumber] = [sentence];
      }
  });

  const promptList = Object.entries(promptDict).map(([key, value]) => {
      return { [key]: [...new Set(value)] };
  });

  promptList.forEach(d => {
      Object.assign(returnDict, d);
  });

  return returnDict;
}

    }
    if (wrongCount >= maxWrong) {
        warmup_failed();
        return false;
    }
    return true;
    }
      
      for (const trial of warmup_trials) { 
            if (trial.role === 'director') {
                 timeline.push(write_warmup_director(trial)); 
             }
         }

      timeline.push(instruction_screen_observation);

      // Add observation trials to the timeline
      timeline.push(...observation_trials);

      timeline.push(instruction_screen_testing);

      // Matching Phase: Build and add matching trials based on trial_items

      const shuffledTargets = jsPsych.randomization.shuffle(trials);

      shuffledTargets.forEach(target => {
        const pair = build_matching_trial(target);
        timeline.push(...pair);
      });

      // trials.forEach(function(target) {
      //     var trials = build_matching_trial(target);
      //     timeline.push(...trials);
      // });

      // Add survey and final screen
      timeline.push(survey_trial);
      timeline.push(final_screen);

      // Run the experiment
      jsPsych.run(timeline);
